name: Build Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    strategy:
      matrix:
        arch: [aarch64-apple-darwin, x86_64-apple-darwin]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: Install Rust
      uses: dtolnay/rust-action@stable
      with:
        targets: ${{ matrix.arch }}
        
    - name: Install dependencies
      run: npm install
      
    - name: Build macOS DMG
      run: |
        if [ "${{ matrix.arch }}" = "aarch64-apple-darwin" ]; then
          npm run build:macos:dmg:arm64
        else
          npm run build:macos:dmg:x64
        fi
      shell: bash
      
    - name: Upload DMG artifact
      uses: actions/upload-artifact@v4
      with:
        name: payslip-mailer-macos-${{ matrix.arch }}
        path: src-tauri/target/release/bundle/dmg/*.dmg

  build-windows:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: Install Rust
      uses: dtolnay/rust-action@stable
      with:
        targets: x86_64-pc-windows-msvc
        
    - name: Install dependencies
      run: npm install
      
    - name: Build Windows MSI
      run: npm run build:windows:msi
      
    - name: Upload MSI artifact
      uses: actions/upload-artifact@v4
      with:
        name: payslip-mailer-windows-x64
        path: src-tauri/target/release/bundle/msi/*.msi

  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts
        
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: artifacts/**/*
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
